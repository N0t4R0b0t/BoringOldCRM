name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build from (e.g. v1.0.0). Leave blank to build a snapshot from HEAD."
        required: false

jobs:
  cleanup:
    name: Cleanup old artifacts & releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Delete all workflow artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting all workflow artifacts..."
          gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate -q '.artifacts[].id' | while read artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api repos/${{ github.repository }}/actions/artifacts/$artifact_id -X DELETE
          done
          echo "All artifacts deleted"

      - name: Delete old releases (keep only latest tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TAG: ${{ inputs.tag }}
        run: |
          echo "Cleaning up old releases..."

          RELEASES=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName,isPrerelease)

          if [ -z "$RELEASES" ] || [ "$RELEASES" = "[]" ]; then
            echo "No releases found"
            exit 0
          fi

          # Keep the latest versioned tag (non-prerelease) and the snapshot (prerelease)
          LATEST_TAG=$(echo "$RELEASES" | jq -r '.[] | select(.isPrerelease == false) | .tagName' | head -1)
          SNAPSHOT_TAG=$(echo "$RELEASES" | jq -r '.[] | select(.isPrerelease == true) | .tagName' | head -1)

          # If rebuilding a specific tag, that tag becomes the intended latest
          if [[ -n "$TARGET_TAG" ]]; then
            LATEST_TAG="$TARGET_TAG"
          fi

          echo "Keeping: tag=[$LATEST_TAG] snapshot=[$SNAPSHOT_TAG]"

          echo "$RELEASES" | jq -r '.[] | .tagName' | while read tag; do
            [ -n "$tag" ] || continue
            if [[ "$tag" != "$LATEST_TAG" && "$tag" != "$SNAPSHOT_TAG" ]]; then
              echo "Deleting release $tag"
              gh release delete "$tag" --yes --cleanup-tag --repo ${{ github.repository }}
            fi
          done

          echo "Cleanup complete"

  build:
    name: Build & package
    runs-on: ubuntu-latest
    needs: cleanup
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        id: version
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [[ -n "${{ inputs.tag }}" ]]; then
            # Manual dispatch with specific tag — rebuild that version
            VERSION="${{ inputs.tag }}"
            DISPLAY_VERSION="${VERSION}+${SHORT_SHA}"
            SNAPSHOT="false"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Automatic trigger on tag push
            VERSION="${{ github.ref_name }}"
            DISPLAY_VERSION="${VERSION}+${SHORT_SHA}"
            SNAPSHOT="false"
          else
            # Manual dispatch with no tag — build snapshot from HEAD
            VERSION="snapshot"
            DISPLAY_VERSION="snapshot+${SHORT_SHA}"
            SNAPSHOT="true"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "snapshot=$SNAPSHOT" >> "$GITHUB_OUTPUT"
          echo "package=bocrm-${DISPLAY_VERSION}.tar.xz" >> "$GITHUB_OUTPUT"

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew bootJar -q

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
          VITE_APP_VERSION: ${{ steps.version.outputs.display_version }}
          VITE_OIDC_AUTHORITY: ${{ secrets.VITE_OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_REDIRECT_URI: ${{ secrets.VITE_OIDC_REDIRECT_URI }}
          VITE_OIDC_AUTHORIZATION_ENDPOINT: ${{ secrets.VITE_OIDC_AUTHORIZATION_ENDPOINT }}
          VITE_OIDC_TOKEN_ENDPOINT: ${{ secrets.VITE_OIDC_TOKEN_ENDPOINT }}
          VITE_OIDC_SCOPE: ${{ secrets.VITE_OIDC_SCOPE }}
        run: |
          npm ci --silent
          npm run build

      - name: Create release package
        run: |
          mkdir -p staging/frontend
          JAR=$(ls backend/build/libs/*.jar | grep -v plain | head -1)
          cp "$JAR" staging/bocrm.jar
          cp -r frontend/dist/. staging/frontend/
          mkdir -p dist
          # Use tar.xz for better compression than gzip
          tar -cJf "dist/${{ steps.version.outputs.package }}" -C staging .
          echo "Package size: $(du -sh "dist/${{ steps.version.outputs.package }}" | cut -f1)"

      - name: Delete existing snapshot release
        if: steps.version.outputs.snapshot == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete snapshot --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.display_version }}
          files: dist/${{ steps.version.outputs.package }}
          generate_release_notes: ${{ steps.version.outputs.snapshot != 'true' }}
          prerelease: ${{ steps.version.outputs.snapshot == 'true' }}
          body: ${{ steps.version.outputs.snapshot == 'true' && format('Snapshot build from commit {0}', github.sha) || '' }}
